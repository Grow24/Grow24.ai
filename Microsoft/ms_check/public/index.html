<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Microsoft Graph API Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 60px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 30px;
            background: linear-gradient(135deg, #0078d4 0%, #00bcf2 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }

        h1 {
            color: #2d3748;
            font-size: 32px;
            margin-bottom: 15px;
            font-weight: 600;
        }

        p {
            color: #718096;
            font-size: 16px;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .login-btn {
            background: linear-gradient(135deg, #0078d4 0%, #00bcf2 100%);
            color: white;
            border: none;
            padding: 18px 50px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 120, 212, 0.4);
            display: inline-flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 120, 212, 0.6);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .features {
            margin-top: 50px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            text-align: left;
        }

        .feature {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #4a5568;
            font-size: 14px;
        }

        .feature-icon {
            width: 40px;
            height: 40px;
            background: #f7fafc;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 40px 30px;
            }

            h1 {
                font-size: 26px;
            }

            .features {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="5" y="2" width="14" height="20" rx="2" ry="2"/>
                <line x1="12" y1="18" x2="12.01" y2="18"/>
            </svg>
        </div>
        <h1>Microsoft Graph Dashboard</h1>
        <p>Access your Microsoft profile, OneDrive files, and SharePoint sites with a single sign-on</p>
        
        <button class="login-btn" onclick="login()">
            <svg width="20" height="20" viewBox="0 0 21 21" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M0 0h10v10H0V0zm11 0h10v10H11V0zM0 11h10v10H0V11zm11 0h10v10H11V11z" fill="currentColor"/>
            </svg>
            Sign in with Microsoft
        </button>

        <div class="features">
            <div class="feature">
                <div class="feature-icon">👤</div>
                <span>User Profile</span>
            </div>
            <div class="feature">
                <div class="feature-icon">📁</div>
                <span>OneDrive Files</span>
            </div>
            <div class="feature">
                <div class="feature-icon">🏢</div>
                <span>SharePoint Sites</span>
            </div>
            <div class="feature">
                <div class="feature-icon">🔍</div>
                <span>File Search</span>
            </div>
        </div>
    </div>

    <script>
        function login() {
            window.location.href = '/auth/login';
        }
    </script>
</body>
</html>
