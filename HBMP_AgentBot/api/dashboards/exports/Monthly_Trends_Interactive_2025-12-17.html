        // Fallback: Ensure Chart.js loads even if CDN is slow
        (function() {
            let attempts = 0;
            const maxAttempts = 50;
            const checkChart = setInterval(function() {
                attempts++;
                if (typeof Chart !== 'undefined') {
                    clearInterval(checkChart);
                    console.log('Chart.js loaded successfully');
                    // Trigger initialization if DOM is ready
                    if (document.readyState !== 'loading' && typeof initializeDashboard === 'function') {
                        setTimeout(initializeDashboard, 100);
                    }
                } else if (attempts >= maxAttempts) {
                    clearInterval(checkChart);
                    console.error('Chart.js failed to load after ' + maxAttempts + ' attempts');
                    // Try alternative CDN
                    const script = document.createElement('script');
                    script.src = 'https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js';
                    script.onload = function() {
                        console.log('Chart.js loaded from alternative CDN');
                        if (typeof initializeDashboard === 'function') {
                            setTimeout(initializeDashboard, 100);
                        }
                    };
                    document.head.appendChild(script);
                }
            }, 100);
        })();
    </script>

        // Initialize dashboard - wait for Chart.js to load
        function initializeDashboard() {
            // Check if Chart.js is loaded

                console.log('Waiting for Chart.js to load...');
                setTimeout(initializeDashboard, 100);
                return;
            }
            
            console.log('Chart.js loaded, initializing dashboard...');
            renderDashboard();
            // Delay chart creation to ensure DOM is ready
            setTimeout(() => {
                createCharts();
            }, 200);
        }

        // Use both DOMContentLoaded and check for Chart.js
        if (document.readyState === 'loading') {
            window.addEventListener('DOMContentLoaded', initializeDashboard);
        } else {
            // DOM already loaded, but wait for Chart.js
            initializeDashboard();
        }

        function renderDashboard() {
            try {

                return;
            }

                // Gross Profit Chart
                const ctx2 = document.getElementById('grossProfitChart');
                if (ctx2) {
                    try {
                        grossProfitChart = new Chart(ctx2, {
                            type: 'bar',
                            data: {
                                labels: currentData.grossProfit.map(d => d.quarter || ''),
                                datasets: [

                                        data: currentData.grossProfit.map(d => d.grossProfit || 0),
                                        backgroundColor: '#3B82F6',
                                        borderColor: '#3B82F6',
                                        borderWidth: 1
                                    },
                                    {
                                        label: comparisonMode === 'vs Prior' ? 'Prior Year' : 'Target',
                                        data: currentData.grossProfit.map(d => d.gpPriorTarget || 0),
                                        backgroundColor: '#FBBF24',
                                        borderColor: '#FBBF24',
                                        borderWidth: 1

                                    {
                                        label: 'Sales',
                                        data: currentData.grossProfit.map(d => d.sales || 0),

        function renderTable() {
            const container = document.getElementById('tableContainer');
            if (!container) {
                console.warn('Table container not found');
                return;
            }
            
            // Check if data exists
            if (!ALL_DATA || !ALL_DATA[selectedYear] || !ALL_DATA[selectedYear][comparisonMode]) {
                container.innerHTML = '<p style="color: #718096; padding: 20px; text-align: center;">No data available for selected filters</p>';
                return;
            }
            
            const currentData = ALL_DATA[selectedYear][comparisonMode];
            const data = currentData[activeTab] || [];
            
            if (!Array.isArray(data) || data.length === 0) {
                container.innerHTML = '<p style="color: #718096; padding: 20px; text-align: center;">No data available</p>';
                return;
            }
            
            const filteredData = data.filter(row => {
                if (!searchTerm) return true;
                return Object.values(row).some(val => 
                    String(val || '').toLowerCase().includes(searchTerm.toLowerCase())
                );
            });

            if (filteredData.length === 0) {
                container.innerHTML = '<p style="color: #718096; padding: 20px; text-align: center;">No matching data found for "' + searchTerm + '"</p>';
                return;
            }

            const headers = Object.keys(filteredData[0]);
            let tableHTML = '<table><thead><tr>';
            headers.forEach(header => {
                tableHTML += `<th>${formatLabel(header)}</th>`;
            });
            tableHTML += '</tr></thead><tbody>';

            filteredData.forEach(row => {
                tableHTML += '<tr>';
                headers.forEach(header => {
                    tableHTML += `<td>${formatValue(row[header])}</td>`;
                });
                tableHTML += '</tr>';
            });

            tableHTML += '</tbody></table>';
            container.innerHTML = tableHTML;
        }

        function changeYear(year) {
            selectedYear = year;
            renderDashboard();
            // Wait for DOM update before creating charts
            setTimeout(() => {
                createCharts();
            }, 100);
        }

        function changeMode(mode) {
            comparisonMode = mode;
            renderDashboard();
            // Wait for DOM update before creating charts
            setTimeout(() => {
                createCharts();
            }, 100);
        }

        function changeTab(tab) {
            activeTab = tab;
            searchTerm = '';
            renderDashboard();
            // No need to recreate charts when changing tabs, just update table
            renderTable();
        }

        function handleSearch(event) {
            searchTerm = event.target.value;
            renderTable();
        }

        function formatLabel(str) {
            return str.replace(/([A-Z])/g, ' $1').replace(/^./, s => s.toUpperCase()).trim();
        }

        function formatValue(val) {
            if (val === null || val === undefined) return '-';
            if (typeof val === 'number') {
                return val.toLocaleString('en-US', { maximumFractionDigits: 2 });
            }
            return String(val);
        }
        
        // Global error handler
        window.addEventListener('error', function(e) {
            console.error('Global error:', e.error);
            const root = document.getElementById('dashboard-root');
            if (root && !root.querySelector('.error-message')) {
                root.innerHTML += '<div class="error-message" style="padding: 20px; margin-top: 20px; background: #fed7d7; color: #e53e3e; border-radius: 8px; display: flex; align-items: center;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"></path><path d="M12 9v4"></path><path d="M12 17h.01"></path></svg>An error occurred. Check console for details.</div>';
            }
        });
