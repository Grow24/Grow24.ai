events {
    worker_connections 1024;
}

http {
    upstream collabora {
        server collabora:9980;
    }

    # Handle WebSocket upgrade
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    server {
        listen 8080;
        server_name localhost;

        # Allow large file uploads for WOPI
        client_max_body_size 50M;

        # Collabora WebSocket and HTTP
        location / {
            proxy_pass http://collabora;
            proxy_set_header Host $host:9980;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 36000s;
        }

        # WOPI requests from Collabora to HBMP server (via host.docker.internal)
        # This allows Collabora to reach the HBMP WOPI server
    }
}
