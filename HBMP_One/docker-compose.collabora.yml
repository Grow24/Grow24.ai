services:
  collabora:
    # Using development edition for better HTTP support
    image: collabora/code:latest
    container_name: hbmp-collabora
    ports:
      - "9980:9980"
    environment:
      # Allow your HBMP host (WOPI host). Use host.docker.internal for Mac/Windows Docker Desktop
      - aliasgroup1=http://host.docker.internal:4000
      # Enable development mode with username/password (bypasses some SSL checks)
      - username=admin
      - password=admin
      # Completely disable SSL
      - extra_params=--o:ssl.enable=false --o:ssl.termination=false --o:net.proto=IPv4 --o:net.listen=any
      - DONT_GEN_SSL_CERT=true
    cap_add:
      - MKNOD
    restart: unless-stopped
