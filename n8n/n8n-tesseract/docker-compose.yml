version: "3.9"

services:
  n8n:
    build:
      context: .
    image: n8n-tesseract
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=admin123
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - N8N_PATH=/n8n/
      - N8N_EDITOR_BASE_URL=http://localhost:5173/n8n/
      - N8N_CUSTOM_EXTENSIONS=/data/community_nodes
      - N8N_COMMUNITY_PACKAGES_ENABLED=true
      - N8N_USER_FOLDER=/data
    volumes:
      - ${USERPROFILE}/.n8n:/home/node/.n8n
      - ./data:/data
    restart: unless-stopped



